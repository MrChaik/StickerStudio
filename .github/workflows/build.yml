name: Build for Testing
on:
  push:
    branches:
      - main         # Triggers when pushing/merging into main
      - 'feature/**' # Triggers when pushing to feature branches (optional, change as needed)

jobs:
  build_test_app:
    name: Create Installable Test App
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 
          cache: npm       

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_AUTO_BUILD_TOKEN }} 

      - name: 📦 Install dependencies
        run: npm ci 

      - name: 🚀 Build Testing App on EAS
        # We changed --profile to "preview" and removed "--auto-submit"
        run: eas build --platform all --profile preview --non-interactive